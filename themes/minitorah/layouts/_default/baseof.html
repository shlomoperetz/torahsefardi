<!doctype html>
<html lang="es" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ if .Title }}{{ .Title }} | {{ end }}Torah Sefardí — La Torá en Español</title>
    <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
    <meta name="keywords" content="{{ site.Params.keywords }}">
    <link rel="canonical" href="{{ .Permalink }}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Torah Sefardí">
    <meta property="og:title" content="{{ if .Title }}{{ .Title }} | {{ end }}Torah Sefardí">
    <meta property="og:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
    <meta property="og:url" content="{{ .Permalink }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Hebrew:wght@100..900&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ "css/site.css" | relURL }}?v={{ now.Unix }}">
    <link rel="stylesheet" href="{{ "css/torah.css" | relURL }}?v={{ now.Unix }}">
  </head>
  <body class="{{ if .IsHome }}is-landing{{ end }}">

    <header class="topbar">
      <a href="/" class="brand">
        <span class="brand-title">Torah Sefardí</span>
        <span class="brand-byline">by Shlomo Peretz</span>
      </a>

      <div class="topbar-actions">
        <!-- Controles de texto -->
        <div class="text-controls" id="textControls">
          <div class="font-popover-wrap">
            <button class="tbar-btn" onclick="toggleFontMenu()" title="Tamaño de texto">A</button>
            <div class="font-popover">
              <button onclick="adjustFont(1)">A+ Mayor</button>
              <button onclick="adjustFont(-1)">A− Menor</button>
            </div>
          </div>
          <div class="tbar-sep"></div>
          <button class="tbar-btn tbar-toggle" id="btnHe" onclick="toggleView('he')" title="Hebreo">א</button>
          <button class="tbar-btn tbar-toggle" id="btnEs" onclick="toggleView('es')" title="Español">ES</button>
        </div>

        <!-- Controles UI -->
        <div class="ui-controls">
          <button class="tbar-btn" onclick="openSearch()" title="Buscar" aria-label="Buscar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </button>
          <button class="tbar-btn" onclick="toggleDarkMode()" title="Cambiar tema" aria-label="Tema">
            <svg id="iconSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg id="iconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="page">
        {{ block "main" . }}{{ end }}
      </div>
    </main>

    <nav class="bottombar" aria-label="Navegación">
      <a class="bbtn {{ if eq .RelPermalink "/" }}active{{ end }}" href="/">Inicio</a>
      <a class="bbtn {{ if in .RelPermalink "/torah/" }}active{{ end }}" href="/torah/">Torá</a>
    </nav>

    <!-- Search -->
    <div id="searchOverlay" onclick="closeSearch()" style="display:none"></div>
    <div id="searchPanel" style="display:none" role="dialog" aria-label="Buscar">
      <div class="search-header">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.4;flex-shrink:0">
          <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" id="searchInput" placeholder="Buscar libro o capítulo..." oninput="doSearch(this.value)" autocomplete="off" />
        <button class="search-close" onclick="closeSearch()" aria-label="Cerrar">×</button>
      </div>
      <div id="searchResults"></div>
    </div>

    <script src="{{ "js/torah.js" | relURL }}?v={{ now.Unix }}" defer></script>
  </body>
</html>
