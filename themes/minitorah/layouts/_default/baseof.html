<!doctype html>
<html lang="es" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ if .Title }}{{ .Title }} | {{ end }}Torah Sefardí — La Torá en Español</title>
    <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
    <meta name="keywords" content="{{ site.Params.keywords }}">
    <link rel="canonical" href="{{ .Permalink }}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Torah Sefardí">
    <meta property="og:title" content="{{ if .Title }}{{ .Title }} | {{ end }}Torah Sefardí">
    <meta property="og:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
    <meta property="og:url" content="{{ .Permalink }}">
    <meta property="og:image" content="https://torah.sefardi.com/favicon.png">
    <meta property="og:image:width" content="500">
    <meta property="og:image:height" content="500">
    <meta property="og:locale" content="es_ES">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ if .Title }}{{ .Title }} | {{ end }}Torah Sefardí">
    <meta name="twitter:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
    <meta name="twitter:image" content="https://torah.sefardi.com/favicon.png">
    <meta name="author" content="Shlomo Peretz">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Torah Sefardí",
      "url": "https://torah.sefardi.com",
      "description": "{{ site.Params.description }}",
      "inLanguage": ["es", "he"],
      "author": {
        "@type": "Person",
        "name": "Shlomo Peretz",
        "url": "https://sefardi.com"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://torah.sefardi.com/torah/",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#d4af37" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0e0d0b" media="(prefers-color-scheme: dark)">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Torah Sefardí">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Hebrew:wght@100..900&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ "css/site.css" | relURL }}?v={{ now.Unix }}">
    <link rel="stylesheet" href="{{ "css/torah.css" | relURL }}?v={{ now.Unix }}">
    <script>(function(){try{var t=localStorage.getItem('theme');var dark=t?t==='dark':window.matchMedia('(prefers-color-scheme:dark)').matches;if(dark)document.documentElement.classList.add('dark-mode');}catch(e){}})();</script>
    <script defer src="https://stats.shlomoperetz.com/script.js" data-website-id="fd31a65d-94bd-4ab0-aead-5e2be7b9b75f"></script>
  </head>
  <body class="{{ if .IsHome }}is-landing{{ end }}">

    <div class="site-header" id="site-header">
    <header class="topbar">
      <div class="topbar-inner">

        <div class="brand">
          <a href="/" class="brand-title" data-i18n="brand_title">Torah Sefardí</a>
        </div>

        <div class="topbar-crumb" id="topbar-crumb"></div>

        <nav class="topbar-nav" aria-label="Controles">
          <div class="tnav-lang-wrap">
            <button class="tnav-lang" id="btn-lang" onclick="toggleLangMenu()" title="Idioma">ES</button>
            <div class="tnav-lang-menu" id="lang-menu">
              <button class="tnav-lang-opt active" data-lang="es">ES <span>Español</span></button>
              <button class="tnav-lang-opt" data-lang="he">עב <span>עברית</span></button>
            </div>
          </div>
          <div class="tnav-group">
            <div class="tnav-fontsize-wrap">
              <button class="tnav-btn tnav-fs-btn" onclick="adjustFont(1)"  title="Aumentar texto">A+</button>
              <button class="tnav-btn tnav-fs-btn" onclick="adjustFont(-1)" title="Reducir texto">A−</button>
              <div class="tnav-fs-mobile font-popover-wrap">
                <button class="tnav-btn" onclick="toggleFontMenu()" title="Tamaño de texto">Aa</button>
                <div class="font-popover">
                  <button onclick="adjustFont(1)">A+</button>
                  <button onclick="adjustFont(-1)">A−</button>
                </div>
              </div>
              <div class="tnav-sep"></div>
            </div>
            <button class="tnav-btn" onclick="toggleDarkMode()" title="Cambiar tema" id="btn-dark">
              <svg id="iconSun" aria-hidden="true" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
              <svg id="iconMoon" aria-hidden="true" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <div class="tnav-sep"></div>
            <button class="tnav-btn" onclick="openSearch()" title="Buscar" aria-label="Buscar">
              <svg aria-hidden="true" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
            <div class="tnav-sep tnav-apoyar-wrap"></div>
            <a class="tnav-btn tnav-apoyar-wrap" href="/apoyar/" title="Apoyar el proyecto">
              <svg aria-hidden="true" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            </a>
          </div>
        </nav>

      </div>
    </header>

    <div class="subbar">
      <div class="subbar-inner">
        <div class="view-pill">
          <button id="btnHe" onclick="toggleView('he')" class="vp-btn active" title="Solo hebreo">עב</button>
          <button id="btnEs" onclick="toggleView('es')" class="vp-btn active" title="Solo español">ES</button>
        </div>
      </div>
    </div>
    </div><!-- /.site-header -->

    <main class="main-content">
      <div class="page">
        {{ block "main" . }}{{ end }}
      </div>
      <footer>
        <p>
          Editorial Sefardí · <a href="https://sefardi.com">sefardi.com</a>
        </p>
        <p>
          © {{ now.Year }}
          &nbsp;·&nbsp;
          <a href="https://tehilim.sefardi.com">Tehilim</a>
          &nbsp;·&nbsp;
          <a href="https://siddur.sefardi.com">Sidur</a>
          &nbsp;·&nbsp;
          <a href="https://birkat.sefardi.com">Birkat</a>
        </p>
      </footer>
    </main>

    {{ partial "sefardi-key.html" . }}

    <nav class="bottombar" aria-label="Navegación">
      <a class="bbtn {{ if eq .RelPermalink "/" }}active{{ end }}" href="/" data-i18n="nav_home">Inicio</a>
      <a class="bbtn {{ if in .RelPermalink "/torah/" }}active{{ end }}" href="/torah/" data-i18n="nav_torah">Torá</a>
      <a class="bbtn {{ if in .RelPermalink "/parashot/" }}active{{ end }}" href="/parashot/" data-i18n="nav_parashot">Parashot</a>
      <a class="bbtn {{ if in .RelPermalink "/neviim/" }}active{{ end }}" href="/neviim/" data-i18n="nav_neviim">Nevi'im</a>
      <a class="bbtn {{ if in .RelPermalink "/ketuvim/" }}active{{ end }}" href="/ketuvim/" data-i18n="nav_ketuvim">Ketuvim</a>
    </nav>

    <!-- Search -->
    <div id="searchOverlay" onclick="closeSearch()" style="display:none"></div>
    <div id="searchPanel" style="display:none" role="dialog" aria-label="Buscar">
      <div class="search-header">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.4;flex-shrink:0">
          <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" id="searchInput" placeholder="Buscar libro o capítulo..." oninput="doSearch(this.value)" autocomplete="off" />
        <button class="search-close" onclick="closeSearch()" aria-label="Cerrar">×</button>
      </div>
      <div id="searchResults"></div>
    </div>

    <script src="{{ "js/parasha-map.js" | relURL }}?v={{ now.Unix }}" defer></script>
    <script src="{{ "js/torah.js" | relURL }}?v={{ now.Unix }}" defer></script>
  </body>
</html>
